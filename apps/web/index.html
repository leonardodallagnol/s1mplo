        <h1>S1mplo — Copiloto de Performance com IA para E-commerce</h1>
        <p>
          S1mplo é uma plataforma SaaS brasileira de copiloto de performance com inteligência artificial,
          desenvolvida pela <strong>Brainside Ltda</strong>. Conecta as principais plataformas de anúncios
          e e-commerce em um único painel inteligente para gestores de tráfego e agências.
        </p>

        <h2>Integrações suportadas</h2>
        <ul>
          <li><strong>Google Ads</strong> — integração via Google Ads API para leitura de métricas de campanhas, grupos de anúncios e performance.</li>
          <li><strong>Google Analytics (GA4)</strong> — integração via Google Analytics Data API para sessões, funil de conversão e atribuição UTM.</li>
          <li><strong>Meta Ads (Facebook Ads)</strong> — integração via Meta Marketing API para métricas de anúncios e insights de campanhas.</li>
          <li><strong>TikTok Ads</strong> — integração via TikTok Marketing API para métricas de performance.</li>
          <li><strong>Nuvemshop</strong> — integração para leitura de pedidos pagos e atribuição de UTM.</li>
          <li><strong>Mercado Livre</strong> — integração para leitura de pedidos e métricas de vendas.</li>
        </ul>

        <h2>Como funciona</h2>
        <p>
          A plataforma cruza automaticamente os dados de anúncios (Google Ads, Meta Ads, TikTok Ads)
          com os pedidos reais do e-commerce (Nuvemshop, Mercado Livre) e os dados de analytics (Google Analytics 4),
          calculando o ROAS real e identificando onde investir mais. A inteligência artificial analisa
          todos os dados em conjunto e gera recomendações acionáveis.
        </p>
